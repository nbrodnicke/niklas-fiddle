schemaVersion: v0.2
prepare:
  steps:
    - name: npm init -y
      command: npm init -y
    - name: npm install express
      command: npm install express
    - name: npm install cors
      command: npm install cors
    - name: npm install pg
      command: npm install pg
test:
  steps: []
run:
  service-2:
    steps:
      - name: npx serve public
        command: npx serve public
    plan: 8
    replicas: 1
    network:
      ports:
        - port: 3000
          isPublic: false
      paths:
        - port: 3000
          path: /
          stripPath: true
    env: {}
  service-3:
    steps:
      - name: echo $password
        command: echo $password
      - name: node server.js
        command: node server.js
    plan: 8
    replicas: 1
    network:
      ports:
        - port: 3000
          isPublic: false
      paths:
        - port: 3000
          path: /api
          stripPath: true
    env:
      password: ${{ vault.dbPassword }}
      conn: https//${{ vault.dbPassword }}${{ workspace.id }}${{ team.id }}
  pg:
    provider:
      name: postgres
      version: v1
    plan:
      id: 0
      parameters:
        storage: 10000
        cpu: 5
        memory: 500
    config:
      version: "17.6"
      userName: "app"         # WICHTIG: Darf nicht "postgres" heißen!
      databaseName: "app"     # Darf "postgres" heißen, "app" ist aber sauberer
    secrets:
      userPassword: ${{ vault.dbPassword }}
      superuserPassword: ${{ vault.dbPassword }}
