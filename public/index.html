<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Frontend zu Backend</title>
    <style>
        /* Ein bisschen CSS, damit die neuen Felder ordentlich aussehen */
        .input-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 100px;
        }
    </style>
</head>
<body>
    <h1>CPU-Minuten Rechner für Teams</h1>

    <div class="input-group">
        <label for="apiToken">API Token:</label>
        <input type="password" id="apiToken" placeholder="CS_...">
    </div>
    
    <div class="input-group">
        <label for="teamId">Team ID:</label>
        <input type="text" id="teamId" placeholder="z.B. 30093">
    </div>

    <div class="input-group">
        <label for="startDate">Von:</label>
        <input type="date" id="startDate">
    </div>

    <div class="input-group">
        <label for="endDate">Bis:</label>
        <input type="date" id="endDate">
    </div>
    
    <button onclick="holeDaten()">Jetzt berechnen</button>
    
    <p id="ergebnis" style="font-weight: bold; color: blue;"></p>

    <script>
    async function holeDaten() {
        const ergebnisFeld = document.getElementById('ergebnis');
        
        const myApiToken = document.getElementById('apiToken').value.trim();
        const myTeamId = document.getElementById('teamId').value.trim();
        const myStartDate = document.getElementById('startDate').value; // NEU
        const myEndDate = document.getElementById('endDate').value;     // NEU

        if (!myApiToken || !myTeamId || !myStartDate || !myEndDate) {
            ergebnisFeld.innerText = "Bitte Token, Team-ID und den Zeitraum vollständig angeben.";
            return;
        }

        if (new Date(myStartDate) > new Date(myEndDate)) {
            ergebnisFeld.innerText = "Das Startdatum darf nicht nach dem Enddatum liegen.";
            return;
        }

        ergebnisFeld.innerText = "Berechnung läuft im Backend... bitte warten.";

        const res = await fetch('/api/hello', {
            method: 'GET',
        });
        console.log('res from hello', res)

        try {
            const response = await fetch('/api/calculate-usage', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    apiToken: myApiToken, 
                    teamId: myTeamId,
					startDate: myStartDate,
                    endDate: myEndDate
                })
            });

            if (!response.ok) {
                throw new Error(`Server-Fehler: ${response.status}`);
            }

            const data = await response.json();

            ergebnisFeld.innerText = `In Summe ${data.cpuMinutes} CPU-Minuten für Team ${data.teamId} im gewählten Zeitraum.`;

        } catch (error) {
            console.error('Fehler:', error);
            ergebnisFeld.innerText = "Fehler bei der Berechnung. Siehe Konsole.";
        }
    }
    </script>
</body>
</html>
